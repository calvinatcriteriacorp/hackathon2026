<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Demand Assessment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 6%;"></div>
            </div>
            <div class="progress-text">Question 3 / 50</div>
        </div>

        <div class="question">
            An appliance store sells 165 dishwashers in the month of November. If it sells 200 more dishwashers in the next month, how many dishwashers does it sell in December?
        </div>

        <form class="options">
            <div class="option">
                <input type="radio" name="answer" id="optionA" value="A">
                <label for="optionA">365</label>
            </div>
            <div class="option">
                <input type="radio" name="answer" id="optionB" value="B">
                <label for="optionB">355</label>
            </div>
            <div class="option">
                <input type="radio" name="answer" id="optionC" value="C">
                <label for="optionC">325</label>
            </div>
            <div class="option">
                <input type="radio" name="answer" id="optionD" value="D">
                <label for="optionD">265</label>
            </div>
            <div class="option">
                <input type="radio" name="answer" id="optionE" value="E">
                <label for="optionE">255</label>
            </div>
        </form>

        <button type="submit" class="submit-btn">Submit Answer</button>
        <a href="index3.html" class="next-btn">Next →</a>
    </div>

    <!-- <script src="script.js"></script> -->
    <!-- <script src="advanced-protection.js"></script> -->
    <!-- <script src="interactive-challenge.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.min.js"></script>
    <script src="eye-tracker.js"></script>
    <script src="cursor-tracker.js"></script>
</body>
</html>
